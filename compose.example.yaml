# SyncBridge — image PRÉ-BUILDÉE (aucun build local). Variante « LECTURE SEULE » :
# SyncBridge VOIT tes cron/systemd/inotify mais NE MODIFIE PAS ton système hôte.
# Pour lui permettre de désactiver/écrire des cron sur l'hôte, prends plutôt
# compose.example.system.yaml.
#
# Démarrage :
#   1. cp .env.example .env
#   2. docker compose -f compose.example.yaml up -d
#   3. ouvre http://<ip-serveur>:8788
#      → 1er lancement : l'UI te demande de CRÉER un compte (identifiant + mot de passe).
#
# Chaque volume est un bind mount ; garde uniquement ceux dont tu as besoin.
# Le seul REQUIS est le volume de config (il persiste tes jobs + ton compte).
services:
  syncbridge:
    image: ghcr.io/godsquantum/syncbridge:latest
    container_name: syncbridge
    # root : permet de lire les fichiers root (backups système fidèles). Si tu ne fais
    # que des syncs de fichiers utilisateur, tu peux retirer cette ligne (rootless).
    user: "0:0"
    environment:
      - TZ=${TZ:-Europe/Paris}
      - SB_DATA=/config              # jobs.json + auth.json + config (ne pas changer)
      - SB_UID=${SB_UID:-1000}       # propriétaire imposé aux fichiers de l'app
      - SB_GID=${SB_GID:-1000}
      - SB_IMPORT_PATHS=/import/scripts:/import/crontab
      # Auth : par défaut, compte créé au 1er lancement via l'UI (register).
      # Alternative : imposer le compte par variables d'env (décommente) —
      # dans ce cas, pas de register, on se connecte directement avec ces identifiants.
      #- SYNCBRIDGE_USER=${SYNCBRIDGE_USER}
      #- SYNCBRIDGE_PASSWORD=${SYNCBRIDGE_PASSWORD}
    ports:
      - 8788:8787                    # change SEULEMENT le nombre de gauche si 8788 est pris
    volumes:
      # ─── REQUIS ────────────────────────────────────────────────────────────
      - ./data:/config               # état de l'app (sauvegarde ce dossier = tout sauvegardé)

      # ─── TES DONNÉES (ce que tu synchronises / ce que tes scripts touchent) ──
      - /home/youruser:/home/youruser
      - /home/youruser/scripts:/import/scripts:ro   # scripts à importer/déclencher

      # ─── MONITEUR SYSTÈME — lecture seule « rien ne m'échappe » (Module 4) ───
      # Affiche tous les cron/systemd/inotify de l'hôte. Tout en :ro, zéro risque.
      - /etc/crontab:/host/etc/crontab:ro
      - /etc/cron.d:/host/etc/cron.d:ro
      - /var/spool/cron/crontabs:/host/crontabs:ro
      - /etc/systemd/system:/host/etc/systemd/system:ro
      - /proc:/host/proc:ro

      # ─── OPTIONNEL : jobs Docker (prune, compose pull, docker exec…) ─────────
      - /var/run/docker.sock:/var/run/docker.sock

      # ─── OPTIONNEL : montages NFS imbriqués sous /mnt ───────────────────────
      - type: bind
        source: /mnt
        target: /mnt
        bind:
          propagation: rshared
    restart: unless-stopped
