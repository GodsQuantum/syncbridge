<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SyncBridge — Connexion</title>
<style>
  :root{
    --bg:#0d1117; --surface:#151b24; --surface2:#1b232f; --raise:#212c3b;
    --line:#263041; --ink:#e8eef6; --muted:#8b9bb0; --dim:#5a6b82; --faint:#3a4759;
    --cyan:#3dd7cf; --cyan-d:#186f6a; --cyan-glow:#3dd7cf40; --red:#e56a7d; --green:#54cd8a; --violet:#9d8cf5;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 80% -10%, #12212a 0%, transparent 55%),var(--bg);
    color:var(--ink);font-family:var(--sans);font-size:14px;display:flex;align-items:center;justify-content:center;
    min-height:100%;padding:24px;-webkit-font-smoothing:antialiased}
  .card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 24px 80px rgba(0,0,0,.5);padding:30px 28px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:650;font-size:20px;margin-bottom:4px}
  .mark{width:28px;height:28px;display:flex;flex-direction:column;justify-content:center;gap:4px;flex-shrink:0}
  .mark i{height:5px;border-radius:3px;display:block}
  .mark i:nth-child(1){width:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan-d));box-shadow:0 0 8px var(--cyan-glow)}
  .mark i:nth-child(2){width:60%;background:var(--faint);margin-left:auto}
  .mark i:nth-child(3){width:100%;background:linear-gradient(90deg,var(--violet),#5a4bb0)}
  .sub{color:var(--dim);font-family:var(--mono);font-size:11.5px;margin-bottom:24px;letter-spacing:.02em}
  h1{font-size:16px;font-weight:620;margin-bottom:4px}
  .lead{color:var(--muted);font-size:12.5px;margin-bottom:20px;line-height:1.5}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;
    letter-spacing:.05em;font-weight:600;font-family:var(--mono)}
  input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:11px 13px;font-family:var(--mono);font-size:13px;margin-bottom:15px}
  input:focus{outline:none;border-color:var(--cyan-d);box-shadow:0 0 0 3px var(--cyan-glow)}
  .btn{width:100%;font:inherit;font-size:14px;font-weight:650;border:1px solid var(--cyan);background:var(--cyan);
    color:#042927;padding:12px;border-radius:8px;cursor:pointer;transition:.13s;margin-top:4px}
  .btn:hover{background:#5fe6de;box-shadow:0 4px 18px var(--cyan-glow)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{font-size:12px;margin-top:14px;padding:9px 11px;border-radius:7px;display:none;line-height:1.45}
  .msg.err{display:block;color:var(--red);border:1px solid #6b2f38;background:#1f1214}
  .msg.ok{display:block;color:var(--green);border:1px solid #2b5c42;background:#0f1c16}
  .note{font-size:11px;color:var(--dim);margin-top:16px;line-height:1.5}
  .hidden{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="mark"><i></i><i></i><i></i></span> SyncBridge</div>
  <div class="sub">cron · watch · rsync · scripts</div>

  <div id="register" class="hidden">
    <h1>Créer ton compte</h1>
    <p class="lead">Premier lancement : choisis un identifiant et un mot de passe. Ils protègent l'accès à SyncBridge (qui peut exécuter des scripts sur ton serveur).</p>
    <label>Identifiant</label>
    <input id="r-user" type="text" autocomplete="username" placeholder="ex. arezki">
    <label>Mot de passe</label>
    <input id="r-pass" type="password" autocomplete="new-password" placeholder="≥ 6 caractères">
    <label>Confirme le mot de passe</label>
    <input id="r-pass2" type="password" autocomplete="new-password" placeholder="retape le mot de passe">
    <button class="btn" id="r-btn" onclick="doRegister()">Créer le compte</button>
  </div>

  <div id="login" class="hidden">
    <h1>Connexion</h1>
    <p class="lead">Connecte-toi avec tes identifiants.</p>
    <label>Identifiant</label>
    <input id="l-user" type="text" autocomplete="username" placeholder="identifiant">
    <label>Mot de passe</label>
    <input id="l-pass" type="password" autocomplete="current-password" placeholder="mot de passe">
    <button class="btn" id="l-btn" onclick="doLogin()">Se connecter</button>
  </div>

  <div id="msg" class="msg"></div>
  <div class="note" id="note"></div>
</div>
<script>
const $=s=>document.querySelector(s);
function show(m,t){const el=$("#msg");el.textContent=m;el.className="msg "+(t||"");}
async function init(){
  let st={configured:false,authed:false,envManaged:false};
  try{ st=await (await fetch("/api/auth/status")).json(); }catch(e){}
  if(st.authed){ location.replace("/"); return; }
  if(st.configured){
    $("#login").classList.remove("hidden");
    $("#l-user").focus();
    if(st.envManaged) $("#note").textContent="Compte géré par les variables d'environnement SYNCBRIDGE_USER / SYNCBRIDGE_PASSWORD.";
  }else{
    $("#register").classList.remove("hidden");
    $("#r-user").focus();
  }
}
async function doRegister(){
  const u=$("#r-user").value.trim(), p=$("#r-pass").value, p2=$("#r-pass2").value;
  if(u.length<3) return show("Identifiant : 3 caractères minimum.","err");
  if(p.length<6) return show("Mot de passe : 6 caractères minimum.","err");
  if(p!==p2) return show("Les deux mots de passe ne correspondent pas.","err");
  $("#r-btn").disabled=true;
  const r=await fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({User:u,Password:p})});
  if(!r.ok){ $("#r-btn").disabled=false; return show(await r.text(),"err"); }
  show("Compte créé, connexion…","ok"); location.replace("/");
}
async function doLogin(){
  const u=$("#l-user").value.trim(), p=$("#l-pass").value;
  $("#l-btn").disabled=true;
  const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({User:u,Password:p})});
  if(!r.ok){ $("#l-btn").disabled=false; return show(await r.text(),"err"); }
  location.replace("/");
}
document.addEventListener("keydown",e=>{ if(e.key==="Enter"){ if(!$("#login").classList.contains("hidden"))doLogin(); else if(!$("#register").classList.contains("hidden"))doRegister(); }});
init();
</script>
</body>
</html>
